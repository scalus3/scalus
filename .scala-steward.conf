# The sbt plugin (scalusSbtPlugin) must stay on Scala 2.12 because sbt 1.x
# plugins run on the sbt 2.12 runtime. Pin scala-library to the 2.12 series so
# Scala Steward does not try to bump it to 2.13.x.
updates.pin = [
  { groupId = "org.scala-lang", artifactId = "scala-library", version = "2.12." }
]
