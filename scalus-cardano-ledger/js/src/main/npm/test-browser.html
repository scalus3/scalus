<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalus Cardano Ledger - Browser Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }
        h1 { color: #4cc9f0; }
        .test-result {
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 6px;
            font-family: monospace;
        }
        .success { background: #0a3d2a; border-left: 4px solid #00ff88; }
        .error { background: #3d0a0a; border-left: 4px solid #ff4444; }
        .info { background: #1a2a4a; border-left: 4px solid #4cc9f0; }
        pre {
            background: #0d0d1a;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }
        button {
            background: #4cc9f0;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 5px 10px 0;
        }
        button:hover { background: #7dd8f5; }
        #results { margin-top: 20px; }
        .note {
            background: #2a2a3e;
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Scalus Cardano Ledger - Browser Test</h1>
    <p>Open the browser console (F12) for detailed output.</p>

    <div class="note">
        <strong>Note:</strong> To run the shared test suite, first build it with:
        <code>npm run build:browser-tests</code>
    </div>

    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="runSharedTests()">Run Shared Tests Only</button>
    <button onclick="runLegacyTests()">Run Legacy Tests Only</button>
    <button onclick="clearResults()">Clear</button>

    <div id="results"></div>

    <!-- scalus.js is a self-contained ES module (its @noble/* deps are inlined),
         so it loads directly in the browser with no import map. -->
    <script type="module">
        // Load the ESM bundle and expose its named exports as globals so the
        // (classic-script) test buttons below can use them.
        import * as Scalus from './scalus.js';
        window.Scalus = Scalus.Scalus;
        window.SlotConfig = Scalus.SlotConfig;
        window.Result = Scalus.Result;
        window.Redeemer = Scalus.Redeemer;
        window.dispatchEvent(new Event('scalus-loaded'));
        console.log('Scalus ESM module loaded:', Scalus);
    </script>
    <!-- Load bundled shared tests (built with: npm run build:browser-tests) -->
    <script src="shared-tests-bundle.js" onerror="console.log('shared-tests-bundle.js not found. Run npm run build:browser-tests to build it.')"></script>
    <script src="test-browser.js"></script>
</body>
</html>
