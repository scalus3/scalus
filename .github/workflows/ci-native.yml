name: CI-Native
on:
  push:
    paths-ignore:
      - 'scalus-secp256k1-jni/**'
      - '.github/workflows/**'
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build and test in Nix devshell
        # The native test binaries each carry their own GC heap and run alongside the sbt JVM.
        # The shared `ci` devshell sets -Xmx7g (sized for JVM/JS tests); that leaves too little
        # headroom for the native binaries. Drop the sbt heap to 5G for this job only (the Scala
        # Native build/optimize still fits). Substitution runs inside the nix shell where
        # SBT_OPTS/JAVA_OPTS are defined, so the arg is single-quoted.
        # `free -h`/`nproc` log the runner's real memory/cores while we tune native test memory.
        run: |
          echo "== runner resources =="; free -h; nproc; echo "======================"
          nix develop .#ci --accept-flake-config --command bash -c 'export SBT_OPTS="${SBT_OPTS//-Xmx7g/-Xmx5g}" JAVA_OPTS="${JAVA_OPTS//-Xmx7g/-Xmx5g}"; sbt ci-native'
      - name: Report test results
        uses: sarisia/actions-status-discord@v1
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "CI-Native ❌ - ${{ github.actor }} on ${{ github.ref_name }}"
          description: "[${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})"
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: "GitHub Actions"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          nodetail: true
          notimestamp: true