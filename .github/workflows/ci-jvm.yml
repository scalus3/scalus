name: CI-JVM
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'scalus-secp256k1-jni/**'
      - '.github/workflows/**'
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # Don't cancel the other Scala version's job when one fails.
      fail-fast: false
      matrix:
        include:
          # Full build/test on the default LTS (incl. format + mima checks).
          - { name: lts, task: ci-jvm }
          # Cross-build/test on Scala 3.8.4. Runs in parallel with `lts`.
          - { name: next, task: ci-jvm-next }
          # Previous-LTS (3.3.7) plugin canary: plugin compile + scalus.compiler.* suite.
          - { name: lts-prev, task: ci-jvm-lts-prev }
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v6
      - uses: nixbuild/nix-quick-install-action@v34
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
      - name: Build and test in Nix devshell
        id: build
        run: |
          nix develop .#ci --accept-flake-config --command bash -c "sbt ${{ matrix.task }}" 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          WARNINGS=$(grep -ci "warning:" build.log) || WARNINGS=0
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          exit $BUILD_EXIT_CODE
      - name: Report test results
        uses: sarisia/actions-status-discord@v1
        if: always()
        env:
          WARNINGS: ${{ steps.build.outputs.warnings }}
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "[${{ github.event.repository.name }}] CI-JVM (${{ matrix.name }}) ${{ job.status == 'success' && '✅' || '❌' }} - ${{ github.actor }} on ${{ github.ref_name }}"
          description: "[${{ github.event.head_commit.message }}](${{ github.event.head_commit.url }})${{ steps.build.outputs.warnings > 0 && format('\n⚠️ Warnings: {0}', steps.build.outputs.warnings) || '' }}"
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: "GitHub Actions"
          avatar_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
          nodetail: true
          notimestamp: true
